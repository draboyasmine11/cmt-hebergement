<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation annulée</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 30px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { padding: 30px; text-align: center; background: linear-gradient(135deg, #92400e, #f59e0b); }
        .header .icon { font-size: 48px; color: #ffffff; margin-bottom: 10px; }
        .header h2 { color: #ffffff; margin: 0; font-size: 22px; }
        .body { padding: 30px; color: #333333; line-height: 1.6; }
        .info-box { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 15px; margin: 20px 0; border-radius: 4px; }
        .footer { padding: 20px 30px; background: #f8f9fa; text-align: center; font-size: 12px; color: #6b7280; border-top: 1px solid #e9ecef; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="icon">&#9888;</div>
        <h2>Réservation annulée</h2>
    </div>
    <div class="body">
        <p>Bonjour <strong th:text="${prenom}">Prénom</strong>,</p>
        <div class="info-box">
            <p style="margin:0;">Votre réservation pour la chambre <strong th:text="${chambre}">N° 101</strong> a été <strong style="color:#f59e0b;">annulée</strong>.</p>
        </div>
        <p>Si vous n'êtes pas à l'origine de cette annulation, veuillez contacter le centre d'hébergement.</p>
    </div>
    <div class="footer">
        <p>Ceci est un message automatique, merci de ne pas y répondre.</p>
        <p>Service Social - CMT SONABEL</p>
    </div>
</div>
</body>
</html>
